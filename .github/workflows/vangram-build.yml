name: VanGram Build (Windows x64)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'changelog.txt'
      - 'LEGAL'
      - 'LICENSE'

env:
  UPLOAD_ARTIFACT: "true"
  ONLY_CACHE: "false"
  PREPARE_PATH: "Telegram/build/prepare/prepare.py"
  WIN_SDK: "10.0.26100.0"
  TDESKTOP_API_ID: "2040"
  TDESKTOP_API_HASH: "b18441a1ff607e10a989891a5462e627"

jobs:
  windows:
    name: Windows x64 (Qt6, Debug)
    runs-on: windows-latest

    defaults:
      run:
        shell: cmd

    steps:
      - name: Prepare directories.
        run: |
          mkdir %userprofile%\TBuild\Libraries
          mklink /d %GITHUB_WORKSPACE%\TBuild %userprofile%\TBuild
          echo TBUILD=%GITHUB_WORKSPACE%\TBuild>>%GITHUB_ENV%
          echo LibrariesPath=%GITHUB_WORKSPACE%\TBuild\Libraries\win64>>%GITHUB_ENV%

      - name: Get repository name.
        shell: bash
        run: echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV

      - name: Clone.
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: ${{ env.TBUILD }}/${{ env.REPO_NAME }}

      - name: First set up.
        shell: bash
        run: |
          echo "SDK=$WIN_SDK" >> $GITHUB_ENV

          sed -i '/CMAKE_${lang}_FLAGS_DEBUG_INIT/s/${_Zi}//' "$PROGRAMFILES"/CMake/share/cmake*/Modules/Platform/Windows-MSVC.cmake || true

          echo "$(sha256sum $TBUILD/$REPO_NAME/$PREPARE_PATH | awk '{ print $1 }')" >> CACHE_KEY.txt
          echo "$WIN_SDK" >> CACHE_KEY.txt
          echo "qt6" >> CACHE_KEY.txt
          echo "CACHE_KEY=$(sha256sum CACHE_KEY.txt | awk '{ print $1 }')" >> $GITHUB_ENV

          echo "Configurate git for cherry-picks."
          git config --global user.email "vangram@local"
          git config --global user.name "VanGram CI"

      - uses: ilammy/msvc-dev-cmd@v1
        name: Native Tools Command Prompt.
        with:
          arch: x64
          sdk: ${{ env.WIN_SDK }}
          toolset: 14.44

      - name: NuGet sources.
        run: |
          nuget sources Disable -Name "Microsoft Visual Studio Offline Packages"
          nuget sources Add -Source https://api.nuget.org/v3/index.json & exit 0

      - name: ThirdParty cache.
        id: cache-third-party
        uses: actions/cache@v4
        with:
          path: ${{ env.TBUILD }}/ThirdParty
          key: ${{ runner.OS }}-${{ runner.arch }}-third-party-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-${{ runner.arch }}-third-party-

      - name: Libraries cache.
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.LibrariesPath }}/*
            !${{ env.LibrariesPath }}/cache_keys
            !${{ env.LibrariesPath }}/[qQ]t[_-]*
            ${{ env.LibrariesPath }}/cache_keys/*
            !${{ env.LibrariesPath }}/cache_keys/[qQ]t[_-]*
          key: ${{ runner.OS }}-x64-libs-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-x64-libs-

      - name: Qt cache.
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.LibrariesPath }}/[qQ]t[_-]*
            ${{ env.LibrariesPath }}/cache_keys/[qQ]t[_-]*
          key: ${{ runner.OS }}-x64-qt6-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-x64-qt6-

      - name: Libraries.
        run: |
          %TBUILD%\%REPO_NAME%\Telegram\build\prepare\win.bat skip-release silent qt6

      - name: Free up some disk space.
        shell: bash
        run: find $LibrariesPath '(' '(' ! '(' -name '*.lib' -o -name '*.a' -o -name '*.exe' -o -name '*.h' -o -name '*.hpp' -o -name '*.inc' -o -name '*.cmake' -o -path '*/include/*' -o -path '*/objects-*' -o -path '*/cache_keys/*' -o -path '*/patches/*' ')' -type f ')' -o -empty ')' -delete

      - name: VanGram build.
        if: env.ONLY_CACHE == 'false'
        run: |
          cd %TBUILD%\%REPO_NAME%\Telegram

          call configure.bat ^
          x64 ^
          qt6 ^
          -D TDESKTOP_API_ID=%TDESKTOP_API_ID% ^
          -D TDESKTOP_API_HASH=%TDESKTOP_API_HASH% ^
          -D CMAKE_CONFIGURATION_TYPES=Debug ^
          -D CMAKE_EXE_LINKER_FLAGS="dnsapi.lib" ^
          -D DESKTOP_APP_DISABLE_AUTOUPDATE=OFF ^
          -D DESKTOP_APP_DISABLE_CRASH_REPORTS=OFF

          cmake --build ..\out --config Debug --parallel

      - name: Move artifact.
        if: env.UPLOAD_ARTIFACT == 'true'
        run: |
          set OUT=%TBUILD%\%REPO_NAME%\out\Debug
          mkdir artifact
          move %OUT%\AyuGram.exe artifact\Vangram.exe
          if exist %OUT%\Updater.exe move %OUT%\Updater.exe artifact\

      - uses: actions/upload-artifact@v4
        name: Upload artifact.
        if: env.UPLOAD_ARTIFACT == 'true'
        with:
          name: VanGram-windows-x64-debug
          path: artifact/
          retention-days: 30

      - name: Publish rolling release (self-update source, main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $vh = Get-Content (Join-Path $env:TBUILD "$env:REPO_NAME\Telegram\SourceFiles\core\version.h") -Raw
          $ver    = [int](([regex]::Match($vh, 'AppVersion\s*=\s*(\d+)')).Groups[1].Value)
          $verStr = ([regex]::Match($vh, 'AppVersionStr\s*=\s*"([^"]+)"')).Groups[1].Value
          $tag = "v$verStr"
          Compress-Archive -Path artifact\* -DestinationPath VanGram-windows-x64-debug.zip -Force
          try { gh release delete $tag --yes --cleanup_tag } catch {}
          gh release create $tag VanGram-windows-x64-debug.zip `
            --title "VanGram $verStr" `
            --notes "Automated build of VanGram $verStr (self-update source)." `
            --latest
          $url  = gh release view $tag --json assets --jq '.assets[] | select(.name=="VanGram-windows-x64-debug.zip") | .browser_download_url'
          $size = (Get-Item VanGram-windows-x64-debug.zip).Length
          @{ version = $ver; url = $url; size = $size } |
            ConvertTo-Json -Compress |
            Out-File -Encoding utf8 manifest.json
          gh release upload $tag manifest.json --clobber

